<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function fun1()
        {
            var txtage = document.getElementById("txtage")
            var hmsg = document.getElementById("hmsg")
            let age = parseInt(txtage.value)
            if(age>=18 && age<121){
                hmsg.innerHTML = "Eligible to vote"
                hmsg.style.backgroundColor  = "green"                
            }
            else{
                if(age<0 || age>120)
                {
                    hmsg.innerHTML="Invalid age"
                    hmsg.style.backgroundColor = "gray"
                }
                else{
                hmsg.innerHTML = "Not eligible to vote"
                hmsg.style.backgroundColor = "red"
                }
            }
            txtage.focus()
            txtage.value=""
        }
    </script>
</head>
<body>
    <p>
        Enter age : <input type="text" id="txtage">
        <input type="button" value="Click here" onclick="fun1()">
        <h2 id="hmsg"></h2>
    </p>
    
</body>
</html>
