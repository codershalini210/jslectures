    <script>
        function add(op)
        {
            var txta = document.getElementById("txta")
            var txtb = document.getElementById("txtb")
            var dmsg = document.getElementById("dmsg")
            var c = 0;
           if(op=="+")
           {
            c=parseInt(txta.value)+ parseInt(txtb.value)
            dmsg.innerHTML="sum is "+c
           }
           else if(op=="-"){
c=parseInt(txta.value)- parseInt(txtb.value)
            dmsg.innerHTML="difference is "+c
           
           }
           else if(op=="/"){
c=parseInt(txta.value)/ parseInt(txtb.value)
            dmsg.innerHTML="divide is "+c
           
           }
           else if(op=="*"){
c=parseInt(txta.value)* parseInt(txtb.value)
            dmsg.innerHTML="multiplication is "+c
           
           }
        }
