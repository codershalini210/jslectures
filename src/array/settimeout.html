<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function hello()
        {
            let i =5
            let count = document.getElementById("count")
            setTimeout(() => {
                    // alert("Timeup")
                    count.innerHTML="Timeup"
                    clearInterval(interval)
            }, 5000);
            let interval =  setInterval(()=>{
                i--
                count.innerHTML = i 
        },1000)
        }        
    </script>
</head>
<body onload="hello()">
        <div id="count">
5
        </div>
</body>
</html>
