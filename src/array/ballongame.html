<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height:100dvh;
            width:100%;
            overflow: hidden;
            position: relative;
            background-color: black;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;

        }
        .ballon{
            height:75px;
            width:75px;
            position: absolute;
            top:100dvh;
            /* background-color: orange; */
            border-radius: 50%;
            border-bottom-left-radius: 0%;
            transform: rotate(-45deg);
            animation: animate-ballon ;
        }
        @keyframes animate-ballon {
            from{top:100dvh;display: block;}
            to{top:0px;display: none;}
        }
    </style>
    <script>
      let  colors=["red","orange","Purple","Blue","yellow","Green","violet","pink","yellowgreen"]
        function addballons(){
            let darea = document.getElementById("darea")
            
            setInterval(() => {
                let i  = Math.floor(Math.random() * colors.length);
                console.log(i)
            
                let div = document.createElement("div")
                div.style.backgroundColor=colors[i]
                div.style.left=(i*100)+"px"
                div.className = "ballon"
                if(i<3){
                    i=3
                }
                div.style.animationDuration = i*10+"s"

                div.addEventListener("click",()=>burstballon(div))
                darea.append(div)
            }, 1000);
        }
        function burstballon(d){
            // alert("dlci")
            // alert(d)        
            d.remove()     
           }
    </script>
</head>
<body onload="addballons()">
    <div class="container" id="darea">
<!-- <div class="ballon"></div> -->
    </div>
</body>
</html>
